name: Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || echo "Sin pyproject completo; skipping install"

      - name: Lint
        run: ruff check . || true

      - name: Run eval skeleton (dry-run)
        run: |
          python eval/eval.py --dry-run

      - name: Validate schemas
        run: |
          python -c "import json, sys; [json.load(open(f)) for f in ['schemas/hubspot_mock.json', 'schemas/insights_schema.json']]; print('schemas OK')"
